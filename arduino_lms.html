<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyARHI2kmY3q-IE5sqeMPV0LkfMl8UvQroA",
    authDomain: "sandeep-singh-lms.firebaseapp.com",
    projectId: "sandeep-singh-lms",
    storageBucket: "sandeep-singh-lms.firebasestorage.app",
    messagingSenderId: "494842666506",
    appId: "1:494842666506:web:7ded04df72d9018a7449f3",
    measurementId: "G-XP4S919FPL"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const googleProvider = new GoogleAuthProvider();

  window._fbAuth = auth;
  window._fbDb = db;
  window._fbGoogleProvider = googleProvider;
  window._fbFns = { signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, signOut, updateProfile, doc, getDoc, setDoc };
  window._STATE = {};

  window._onFirebaseLogin = async function(fbUser) {
    const name = fbUser.displayName || fbUser.email.split('@')[0];
    window._currentUser = { uid: fbUser.uid, email: fbUser.email, name };
    try {
      const snap = await getDoc(doc(db, 'users_arduino', fbUser.uid));
      window._STATE = snap.exists() ? (snap.data().progress || {}) : {};
    } catch(e) { console.warn('Firestore read error:', e.message); window._STATE = {}; }
    document.getElementById('auth-loading').style.display = 'none';
    document.getElementById('login-screen').classList.add('hidden');
    document.body.style.overflow = '';
    document.getElementById('user-pill').style.display = 'flex';
    document.getElementById('user-avatar').textContent = name.charAt(0).toUpperCase();
    document.getElementById('user-name-pill').textContent = name.split(' ')[0];
    if(typeof renderAll === 'function') renderAll();
  };

  window._onFirebaseLogout = function() {
    document.getElementById('auth-loading').style.display = 'none';
    document.getElementById('login-screen').classList.remove('hidden');
    document.getElementById('user-pill').style.display = 'none';
    document.body.style.overflow = 'hidden';
    window._currentUser = null;
    window._STATE = {};
    ['si-email','si-pass','su-name','su-email','su-pass','su-pass2'].forEach(id=>{ const el=document.getElementById(id); if(el) el.value=''; });
    ['si-err','su-err'].forEach(id=>{ const el=document.getElementById(id); if(el) el.textContent=''; });
  };

  onAuthStateChanged(auth, async (user) => {
    if (user) { await window._onFirebaseLogin(user); }
    else { window._onFirebaseLogout(); }
  });
</script>

<style>
:root{
  --navy:#070d1a;--navy2:#0d1525;--card:#111e35;--card2:#152240;
  --border:#1a2d4a;--border2:#243d5e;
  --orange:#ff6b2b;--orange2:#ff8c4a;
  --teal:#00c9a7;--teal2:#00e8c0;
  --gold:#f0a500;
  --text:#dde6f0;--muted:#6d8aaa;--white:#ffffff;
  --red:#ef4444;--green:#22c55e;
  --radius:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--navy);color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.7;overflow-x:hidden;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.5;}
body::after{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 10% 20%,rgba(255,107,43,0.04) 0%,transparent 40%),radial-gradient(circle at 90% 80%,rgba(0,201,167,0.04) 0%,transparent 40%);pointer-events:none;z-index:0;}
#rp{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--orange),var(--teal));z-index:300;width:0;transition:width 0.1s;}

/* AUTH LOADING */
#auth-loading{position:fixed;inset:0;background:var(--navy);z-index:1000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;}
.auth-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* LOGIN SCREEN */
#login-screen{position:fixed;inset:0;background:rgba(7,13,26,0.98);z-index:900;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
#login-screen.hidden{display:none;}
.login-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:400px;position:relative;}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--orange),var(--teal));border-radius:20px 20px 0 0;}
.login-logo{font-family:'Syne',sans-serif;font-weight:800;font-size:1.2rem;color:var(--white);text-align:center;margin-bottom:0.25rem;}
.login-logo span{color:var(--orange);}
.login-sub{font-size:0.78rem;color:var(--muted);text-align:center;margin-bottom:1.5rem;}
.login-tabs{display:flex;background:var(--navy2);border-radius:10px;padding:3px;margin-bottom:1.4rem;}
.login-tab{flex:1;text-align:center;padding:0.48rem;font-family:'Syne',sans-serif;font-weight:700;font-size:0.76rem;border-radius:8px;cursor:pointer;transition:all 0.2s;color:var(--muted);}
.login-tab.active{background:var(--card2);color:var(--white);}
.login-field{margin-bottom:0.9rem;}
.login-field label
